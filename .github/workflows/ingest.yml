name: Curio ingest

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar pipeline
        env:
          AI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai
          AI_MODEL: gemini-2.5-flash-lite
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MAX_CALLS: "300"
        run: node src/index.js

      - name: Publicar JSON (commit de docs)
        run: |
          git config user.name  "curio-bot"
          git config user.email "curio-bot@users.noreply.github.com"
          git add -f docs
          git commit -m "feed: actualizacion $(date -u +%FT%TZ)" || echo "Sin cambios"
          git push
